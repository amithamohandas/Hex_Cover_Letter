<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiki — cover letter prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f9f1e5;
    font-family: 'Comic Sans MS', 'Comic Sans', cursive;
  }
  body.playing { cursor: none; }
  body:not(.playing) #laser { opacity: 0; }

  .laserchip {
    display: inline-block;
    width: 15px; height: 15px;
    margin-left: 8px;
    vertical-align: -2px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff5a5a 0%, #ff2020 55%, rgba(255,32,32,0) 78%);
    filter: drop-shadow(0 0 5px rgba(255,40,40,0.85));
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.35); }
  }
  .bubble.clickable { pointer-events: auto; cursor: pointer; }

  .tree {
    position: fixed;
    left: 50%; bottom: 0;
    transform: translateX(-50%);
    height: 94vh;
    user-select: none;
    pointer-events: none;
  }

  #kiki {
    position: fixed;
    pointer-events: none;
    will-change: transform;
    z-index: 5;
  }
  #shadow {
    position: fixed;
    background: rgba(60,50,40,0.15);
    border-radius: 50%;
    pointer-events: none;
    z-index: 4;
  }
  #stuckNote {
    position: fixed;
    background: #f5d94a;
    border: 1.5px solid #6b5d30;
    box-shadow: 1px 2px 0 rgba(0,0,0,0.12);
    pointer-events: none;
    z-index: 6;
    opacity: 0;
    transform-origin: center;
  }
  #laser {
    position: fixed;
    width: 13px; height: 13px;
    background: radial-gradient(circle, #ff5a5a 0%, #ff2020 55%, rgba(255,32,32,0) 75%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%,-50%);
    filter: drop-shadow(0 0 6px rgba(255,40,40,0.8));
    z-index: 3;
  }

  .bubble {
    position: fixed;
    background: #fff;
    border: 2.5px solid #1d1a16;
    border-radius: 50% 48% 52% 50% / 62% 58% 42% 40%;
    padding: 16px 30px 18px;
    font-size: 25px;
    font-weight: 700;
    color: #1d1a16;
    z-index: 7;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s;
    white-space: nowrap;
    filter: url(#roughen);
  }
  .bubble.show { opacity: 1; visibility: visible; }
  .bubble .tail {
    position: absolute;
    bottom: -16px; left: 20px;
    width: 22px; height: 20px;
    overflow: hidden;
  }
  .bubble .tail::before {
    content: '';
    position: absolute;
    top: -12px; left: 6px;
    width: 22px; height: 22px;
    background: #fff;
    border: 2.5px solid #1d1a16;
    border-radius: 0 0 100% 0;
    transform: rotate(20deg);
  }

  .caption {
    position: fixed;
    background: #fbf6e8;
    border: 1.5px solid #57503f;
    box-shadow: 2px 3px 0 rgba(87,80,63,0.18);
    padding: 8px 14px;
    font-family: 'Caveat', cursive;
    font-size: 21px;
    line-height: 1.2;
    color: #3a352c;
    max-width: 240px;
    z-index: 7;
    opacity: 0;
    transition: opacity 0.9s ease;
    transform: rotate(-1.5deg);
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5"/>
  </filter>
</svg>

<img class="tree" id="treeBase" src="tree/1-no-color.png" alt="">
<img class="tree" id="treeColored" src="tree/2-color-sticky-notes.png" alt="" style="opacity:0; transition:opacity 1.4s ease;">
<img class="tree" id="treeColored3" src="tree/3-color-workstation.png" alt="" style="opacity:0; transition:opacity 1.2s ease;">
<img class="tree" id="treeColored4" src="tree/4-color-lego.png" alt="" style="opacity:0; transition:opacity 1.2s ease;">
<img class="tree" id="treeColored5" src="tree/5-color-lego-mess.png" alt="" style="opacity:0; transition:opacity 0.22s ease;">
<img class="tree" id="treeColored6" src="tree/6-cloud-light.png" alt="" style="opacity:0; transition:opacity 1.6s ease;">
<img class="tree" id="treeColored7" src="tree/7-end.png" alt="" style="opacity:0; transition:opacity 1.6s ease;">
<div id="glint" style="position:fixed; width:34px; height:34px; border-radius:50%;
     background:radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(170,200,255,0.55) 45%, rgba(170,200,255,0) 75%);
     pointer-events:none; z-index:6; opacity:0; transform:translate(-50%,-50%) scale(0.4);
     transition:opacity 0.25s ease, transform 0.25s ease;"></div>
<div id="shadow"></div>
<img id="kiki" src="kiki/kiki_sit_front.png" alt="Kiki">
<div id="stuckNote"></div>
<div class="bubble" id="bubble"><span id="bubbleText"></span><span class="tail"></span></div>
<img id="introBubble" alt="" style="position:fixed; width:240px; z-index:8; opacity:0; transition:opacity 0.35s ease; pointer-events:none; user-select:none;">
<img id="introBubble2" alt="" style="position:fixed; width:240px; z-index:8; opacity:0; transition:opacity 0.35s ease; pointer-events:none; user-select:none;">
<img id="laserPointer" src="bubbles/pointer.png" alt="grab the laser" style="position:fixed; width:50px; z-index:8; opacity:0; transition:opacity 0.4s ease, transform 0.2s; pointer-events:none; cursor:pointer; user-select:none;">
<div class="caption" id="caption">Curiosity before conclusions</div>
<div class="caption" id="captionBench">Prototyping as a way of thinking</div>
<div class="caption" id="captionLego">Play as a design method</div>
<div class="caption" id="captionCloud">An open invitation to connect</div>
<div id="laser"></div>

<div id="onboardOverlay" style="position:fixed; inset:0; background:rgba(30,25,20,0.55); z-index:25;
     opacity:0; pointer-events:none; transition:opacity 0.4s ease; display:flex; align-items:center; justify-content:center;">
  <div style="background:#fbf6e8; border:1.5px solid #8a7f6f; border-radius:10px;
       padding:32px 36px; max-width:min(360px,86vw); text-align:center;
       box-shadow:0 20px 50px rgba(0,0,0,0.35);
       transform:translateY(14px) scale(0.97); transition:transform 0.4s ease;" id="onboardCard">
    <p style="font-family:'Comic Sans MS','Comic Sans',cursive; font-weight:700; font-size:26px; color:#1d1a16; margin:0 0 20px; line-height:1.3;">
      Move your mouse — Kiki follows the laser.<br>Guide her all the way up to her house 🏠
    </p>
    <button id="onboardCloseBtn" style="font-family:'Comic Sans MS','Comic Sans',cursive; font-size:14px; background:#1d1a16;
         color:#fbf6e8; border:none; padding:10px 26px; border-radius:20px; cursor:pointer;">
      Got it →
    </button>
  </div>
</div>

<!-- skip toggle — always visible, lets a busy visitor jump straight to the letter -->
<img id="skipToggle" src="bubbles/skip_cv.png" alt="skip to read Amitha's cover letter"
     style="position:fixed; top:16px; right:16px; z-index:15; width:120px; cursor:pointer;
     filter:drop-shadow(0 2px 6px rgba(0,0,0,0.2)); transition:transform 0.15s ease;"
     onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">

<div id="letterOverlay" style="position:fixed; inset:0; background:rgba(30,25,20,0.55); z-index:20;
     opacity:0; pointer-events:none; transition:opacity 0.5s ease; display:flex; align-items:center; justify-content:center;">
  <div id="letterPaper" style="position:relative; max-width:min(680px,92vw); max-height:92vh;
       transform:translateY(16px) scale(0.97); transition:transform 0.5s ease;">
    <img src="letter/cover_letter.png" alt="cover letter" style="display:block; width:100%; max-height:88vh;
         object-fit:contain; border-radius:4px; box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <button id="closeLetterBtn" style="position:absolute; top:-14px; right:-14px; width:32px; height:32px;
         border-radius:50%; background:#fbf6e8; border:1px solid #8a7f6f; color:#57503f;
         font-family:'Comic Sans MS','Comic Sans',cursive; font-size:16px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.2);">×</button>
  </div>
</div>

<!-- the "didn't have time to play" letter — placeholder reuses the same art until a
     dedicated long-form no-play version exists. Swap the <img src> below when ready. -->
<div id="noPlayOverlay" style="position:fixed; inset:0; background:rgba(30,25,20,0.55); z-index:21;
     opacity:0; pointer-events:none; transition:opacity 0.5s ease; display:flex; align-items:center; justify-content:center;">
  <div id="noPlayPaper" style="position:relative; width:min(1100px,94vw); max-height:92vh;
       transform:translateY(16px) scale(0.97); transition:transform 0.5s ease;">
    <img src="letter/noplay_letter.png" alt="cover letter" style="display:block; width:100%; max-height:88vh;
         object-fit:contain; box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <button id="closeNoPlayBtn" style="position:absolute; top:-14px; right:-14px; width:32px; height:32px;
         border-radius:50%; background:#fbf6e8; border:1px solid #8a7f6f; color:#57503f;
         font-family:'Comic Sans MS','Comic Sans',cursive; font-size:16px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.2);">×</button>
  </div>
</div>

<script>
/* ============================================================
   KIKI + THE TREE — surfaces & jumping
   She roams the floor; when the laser moves onto a platform,
   she runs beneath, crouches, and JUMPS up. Laser leaves ->
   she hops back down.
   ============================================================ */

/* ---------- constants ---------- */
const IMG_W = 941, IMG_H = 1672;
const KIKI_SIZE_VH = 15.75;

/* surfaces, in tree-image coordinates.
   y = the surface she stands on; xMin/xMax = walkable band. */
const SURFACES = {
  floor: { y: null, xMin: null, xMax: null },
  /* xMin/xMax = where she may STAND; detMin/detMax = where the laser counts as "on this platform" */
  bench: { y: 1122, xMin: 330, xMax: 545, detMin: 90,  detMax: 590 },
  lego:  { y: 922,  xMin: 510, xMax: 825, detMin: 455, detMax: 865 },
  cloud: { y: 690,  xMin: 235, xMax: 585, detMin: 200, detMax: 615 },
  top:   { y: 300,  xMin: 450, xMax: 720, detMin: 400, detMax: 780 },
};
const LADDER = ['floor', 'bench', 'lego', 'cloud', 'top'];  /* climb order */

/* sticky note trigger on the floor near the tree base */
const TRIGGER_IMG_X = 640, TRIGGER_RANGE = 55;

/* the soldering iron's hot tip, on the bench (image coords) */
const IRON_TIP_X = 515, IRON_RANGE = 42;
let burnt = false;
let ironCooldown = 0;

/* color blooms on ARRIVAL — she brings the color with her */
let bloomed2 = false;   /* base / sticky notes */
let bloomed3 = false;   /* workstation */
let bloomed4 = false;   /* lego platform */
let bloomed6 = false;   /* cloud level */
let bloomed7 = false;   /* the summit */
let cloudTalked = false;
const DOOR_X = 565;     /* house doorway center (img coords) */
let dropletDone = false;
const DROPLET_X = 400, DROPLET_TIP_Y = 578;   /* the short right-hand droplet — reachable from the platform */
let castleIntact = true;
let legoDone = false;   /* true once the whole LEGO sequence (swat + dialogue) finishes */
let maxReached = 0;     /* highest LADDER index she's ever climbed to — she never goes back below it */
const CASTLE_X = 660, CASTLE_RANGE = 70;   /* the build, on the lego platform (img coords) */
const BASE_ZONE_MIN = 180, BASE_ZONE_MAX = 800;   /* img x range of the tree base */

/* ---------- elements ---------- */
const kikiEl = document.getElementById('kiki');
const shadowEl = document.getElementById('shadow');
const laserEl = document.getElementById('laser');
const noteEl = document.getElementById('stuckNote');
const bubbleEl = document.getElementById('bubble');
const bubbleText = document.getElementById('bubbleText');
const captionEl = document.getElementById('caption');
const captionBench = document.getElementById('captionBench');
const captionLego = document.getElementById('captionLego');
const captionCloud = document.getElementById('captionCloud');
const treeColored = document.getElementById('treeColored');

/* ---------- sprites ---------- */
const S = {
  walk: ['kiki/kiki_walk_01.png','kiki/kiki_walk_02.png','kiki/kiki_walk_03.png','kiki/kiki_walk_04.png','kiki/kiki_walk_05.png'],
  run:  ['kiki/kiki_run_01.png','kiki/kiki_run_02.png','kiki/kiki_run_03.png','kiki/kiki_run_04.png','kiki/kiki_run_05.png'],
  sit:  'kiki/kiki_sit_side.png',
  catch:'kiki/kiki_catch.png',
  crouch:'kiki/kiki_jump_crouch.png',
  air:  'kiki/kiki_jump_air.png',
  land: 'kiki/kiki_jump_land.png',
  startled: 'kiki/kiki_startled.png',
  reach: 'kiki/kiki_touch_iron.png',
  swat: 'kiki/kiki_swat.png',
  rearup: 'kiki/kiki_rearup.png',
  stretch: 'kiki/kiki_stretch.png',
  hi: 'kiki/kiki_hi.png',
  sitFront: 'kiki/kiki_sit_front.png',
  kiki_letter: 'kiki/kiki_letter.png',
  meow: 'kiki/kiki_meow.png',
  shake:'kiki/kiki_shake_note.png',
  groom:'kiki/kiki_groom.png',
};
Object.values(S).flat().forEach(src => { const i = new Image(); i.src = src; });

/* preload every dialogue bubble too — without this, the FIRST time a given
   line appears there's a blank gap while it downloads, which shows through
   the crossfade as a blink even though the opacity transition itself is fine */
const BUBBLE_FILES = [
  'hi.png','mom.png','tour.png','invite.png','laser.png','letter_intro_small.png',
  'base_wall.png','base_braindump.png','base_justacat.png','base_stuck.png',
  'bench_favtoy.png','bench_neverplay.png','bench_hot.png','bench_climbagain.png',
  'lego_makesplay.png','lego_allday.png','lego_donttouch.png','lego_whybuildplay.png','lego_playwithme.png',
  'cloud_favproject.png','cloud_imfavourite.png','cloud_butfun.png','cloud_humansplayed.png',
];
BUBBLE_FILES.forEach(f => { const i = new Image(); i.src = 'bubbles/' + f; });

/* measured bottom-padding of each sprite frame (fraction of frame height
   between her lowest paw pixel and the frame edge) — used to pin feet
   to the surface regardless of how each frame was cropped */
const FOOT_PAD = {
  'kiki_catch.png': 0.021, 'kiki_groom.png': 0.000, 'kiki_jump_air.png': 0.176,
  'kiki_jump_crouch.png': 0.045, 'kiki_jump_land.png': 0.005, 'kiki_meow.png': 0.007,
  'kiki_pawshake.png': 0.014, 'kiki_pin.png': 0.007, 'kiki_rearup.png': 0.045,
  'kiki_run_01.png': 0.013, 'kiki_run_02.png': 0.067, 'kiki_run_03.png': 0.000,
  'kiki_run_04.png': 0.010, 'kiki_run_05.png': 0.013, 'kiki_shake_note.png': 0.013,
  'kiki_sit_back.png': 0.052, 'kiki_sit_front.png': 0.048, 'kiki_sit_front_tail.png': 0.001,
  'kiki_sit_side.png': 0.012, 'kiki_stand_left.png': 0.075, 'kiki_stand_right.png': 0.047,
  'kiki_startled.png': 0.010, 'kiki_stretch.png': 0.021, 'kiki_swat.png': 0.027,
  'kiki_walk_01.png': 0.010, 'kiki_walk_02.png': 0.035, 'kiki_walk_03.png': 0.016,
  'kiki_walk_04.png': 0.021, 'kiki_walk_05.png': 0.026,
  'kiki_hi.png': 0.010, 'kiki_touch_iron.png': 0.067, 'kiki_letter.png': 0.001,
};
function footPad() {
  const name = kikiEl.src.split('/').pop();
  return (FOOT_PAD[name] || 0) * KIKI_PX;
}

/* ---------- geometry ---------- */
let KIKI_PX, TREE_SCALE, TREE_LEFT, TREE_TOP;
function computeGeometry() {
  KIKI_PX = innerHeight * KIKI_SIZE_VH / 100;
  const treeH = innerHeight * 0.94;
  TREE_SCALE = treeH / IMG_H;
  TREE_LEFT = innerWidth/2 - (IMG_W*TREE_SCALE)/2;
  TREE_TOP = innerHeight - treeH;
  kikiEl.style.width = KIKI_PX+'px';
  kikiEl.style.height = KIKI_PX+'px';
  shadowEl.style.width = KIKI_PX*0.62+'px';
  shadowEl.style.height = KIKI_PX*0.14+'px';
  noteEl.style.width = KIKI_PX*0.18+'px';
  noteEl.style.height = KIKI_PX*0.17+'px';
  const treeRight0 = TREE_LEFT + IMG_W*TREE_SCALE;
  captionEl.style.left = Math.min(innerWidth-250, treeRight0+10)+'px';
  captionEl.style.top = innerHeight*0.70+'px';

  const treeRight = treeRight0;
  const toScrY = iy => TREE_TOP + iy * TREE_SCALE;
  /* alternating sides, echoing the tree's own zigzag climb: base=right, bench=left, lego=right, cloud=left */
  captionBench.style.left = Math.max(10, TREE_LEFT-190)+'px';
  captionBench.style.top = (toScrY(SURFACES.bench.y) - 40)+'px';

  captionLego.style.left = Math.min(innerWidth-250, treeRight+10)+'px';
  captionLego.style.top = (toScrY(SURFACES.lego.y) - 40)+'px';

  captionCloud.style.left = Math.max(10, TREE_LEFT-190)+'px';
  captionCloud.style.top = (toScrY(SURFACES.cloud.y) - 60)+'px';
}
computeGeometry();
addEventListener('resize', computeGeometry);

const imgX = sx => (sx - TREE_LEFT) / TREE_SCALE;
const imgY = sy => (sy - TREE_TOP) / TREE_SCALE;
const scrX = ix => TREE_LEFT + ix * TREE_SCALE;
const scrY = iy => TREE_TOP + iy * TREE_SCALE;

function surfaceScreenY(name) {
  if (name === 'floor') return innerHeight * 0.96;
  return scrY(SURFACES[name].y);
}
function surfaceBounds(name) {
  if (name === 'floor') return [KIKI_PX/2, innerWidth - KIKI_PX/2];
  const s = SURFACES[name];
  /* inset by ~a third of her body so paws stay on the platform */
  const inset = KIKI_PX * 0.30;
  return [scrX(s.xMin) + inset, scrX(s.xMax) - inset];
}

/* ---------- state ---------- */
let mouseX = innerWidth/2, mouseY = innerHeight/2;
let kx = Math.max(KIKI_PX, innerWidth/2 - (IMG_W*0.94*innerHeight/1672)/2 - KIKI_PX*0.2);
let ky = surfaceScreenY('floor');
let surface = 'floor';
let facing = 1;
let frame = 0, lastFrameT = 0;
let mode = 'intro';               /* intro | free | jump | beat | ... | done */
let beatDone = false;
let lastMove = performance.now();
let wiggle = 0;

addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; lastMove=performance.now(); });
addEventListener('touchmove', e => { const t=e.touches[0]; mouseX=t.clientX; mouseY=t.clientY; lastMove=performance.now(); }, {passive:true});

function setAnim(list, fps, t) {
  if (t - lastFrameT > 1000/fps) { frame=(frame+1)%list.length; lastFrameT=t; }
  kikiEl.src = list[frame%list.length];
}

/* ---------- shared bubble helper: your drawn PNGs crossfade as before,
   ---------- */
const ib = document.getElementById('introBubble');
const ib2 = document.getElementById('introBubble2');
let activeBubble = ib;

function placeBubbleAtKiki() {
  [ib, ib2].forEach(el => {
    const bw = el.offsetWidth || 240;
    let left, top;
    if (surface === 'top') {
      left = kx + KIKI_PX * .05;
      top = ky - 170;
    } else {
      left = kx - 30;
      top = ky - KIKI_PX - 130;
    }
    left = Math.max(8, Math.min(innerWidth - bw - 8, left));
    top = Math.max(8, top);
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  });
}

/* ---------- sound: safe to call even if the file isn't there yet.
   Drop mp3s into a local sounds/ folder named exactly as below. ---------- */
function playSound(name) {
  try {
    const a = new Audio('sounds/' + name + '.mp3');
    a.play().catch(() => {});   /* silently ignore if missing or blocked */
  } catch (e) {}
}

function sayImg(file) {
  placeBubbleAtKiki();
  const incoming = (activeBubble === ib) ? ib2 : ib;
  const outgoing = activeBubble;
  incoming.src = 'bubbles/' + file;
  incoming.style.opacity = 1;
  outgoing.style.opacity = 0;
  activeBubble = incoming;
}

function hideImg() {
  return new Promise(res => {
    activeBubble.style.opacity = 0;
    setTimeout(res, 350);
  });
}

/* ---------- which surface does the laser want? ---------- */
function laserSurface() {
  const ix = imgX(mouseX), iy = imgY(mouseY);
  const tp = SURFACES.top;
  if (ix > tp.detMin && ix < tp.detMax && iy > 20 && iy < tp.y+50) return 'top';
  const c = SURFACES.cloud;
  if (ix > c.detMin && ix < c.detMax && iy > c.y-330 && iy < c.y+50) return 'cloud';
  const l = SURFACES.lego;
  if (ix > l.detMin && ix < l.detMax && iy > l.y-320 && iy < l.y+50) return 'lego';
  const b = SURFACES.bench;
  if (ix > b.detMin && ix < b.detMax && iy > b.y-320 && iy < b.y+60) return 'bench';
  return 'floor';
}

/* she climbs one level at a time — next rung toward where the laser wants her */
function nextRung(want) {
  const cur = LADDER.indexOf(surface), tgt = LADDER.indexOf(want);
  if (tgt > cur) return LADDER[cur+1];
  if (tgt < cur) return LADDER[cur-1];
  return surface;
}

/* ---------- jumping ---------- */
function startJump(toSurface) {
  mode = 'jump';
  const fromX = kx, fromY = ky;
  const [minX, maxX] = surfaceBounds(toSurface);
  const toX = Math.max(minX, Math.min(maxX, mouseX));
  const toY = surfaceScreenY(toSurface);
  facing = (toX > fromX) ? 1 : -1;
  const up = toY < fromY;
  const peak = Math.min(fromY, toY) - KIKI_PX * (up ? 0.55 : 0.35);
  const DUR = 860;

  /* crouch first, then arc */
  kikiEl.src = S.crouch;
  setTimeout(() => {
    const t0 = performance.now();
    kikiEl.src = S.air;
    (function fly(now) {
      const p = Math.min(1, (now - t0) / DUR);
      /* quadratic bezier: from -> peak -> to */
      const q = 1 - p;
      kx = q*q*fromX + 2*q*p*((fromX+toX)/2) + p*p*toX;
      ky = q*q*fromY + 2*q*p*peak + p*p*toY;
      if (p < 1) requestAnimationFrame(fly);
      else {
        kx = toX; ky = toY;
        surface = toSurface;
        maxReached = Math.max(maxReached, LADDER.indexOf(surface));
        kikiEl.src = S.land;
        /* she brings the color: levels bloom the moment she lands */
        if (toSurface === 'bench' && !bloomed3) {
          document.getElementById('treeColored3').style.opacity = 1;
          bloomed3 = true;
          runBenchArrival();
          return;
        }
        if (toSurface === 'lego' && !bloomed4) {
          document.getElementById('treeColored4').style.opacity = 1;
          bloomed4 = true;
          runLegoArrival();
          return;
        }
        if (toSurface === 'cloud' && !cloudTalked) {
          cloudTalked = true;
          runCloudArrival();
          return;
        }
        /* NOTE: the cloud does NOT bloom on arrival — it lights when she
           touches the droplet. Touch brings the light. (In Sync's own rule.) */
        if (toSurface === 'top') {
          setTimeout(() => { runFinale(); }, 300);
          return;   /* the finale takes over; no return to free */
        }
        setTimeout(() => { mode = 'free'; }, 280);
      }
    })(t0);
  }, 400);
}

/* ---------- the YEOW: hot iron touch ---------- */
function runYeow() {
  mode = 'yeow';
  const wait = ms => new Promise(res => setTimeout(res, ms));

  (async () => {
    /* step to where her outstretched paw actually lands on the hot tip */
    facing = 1;
    const touchX = scrX(IRON_TIP_X) - KIKI_PX * 0.38;  /* paw reaches ahead of body center */
    const [bMin, bMax] = surfaceBounds('bench');
    kx = Math.max(bMin, Math.min(bMax, touchX));
    kikiEl.src = S.reach;
    await wait(420);   /* the reach — a beat before the burn */

    /* instant panic — small vertical pop in place */
    kikiEl.src = S.startled;
    const popStart = ky;
    const t0 = performance.now();
    await new Promise(res => {
      (function pop(now) {
        const p = Math.min(1, (now - t0)/260);
        ky = popStart - Math.sin(p*Math.PI) * KIKI_PX*0.5;
        if (p < 1) requestAnimationFrame(pop); else { ky = popStart; res(); }
      })(t0);
    });
    await wait(120);

    /* flee: leap off the bench down to the floor, startled the whole way */
    const fromX = kx, fromY = ky;
    const toX = Math.min(innerWidth - KIKI_PX/2, kx + KIKI_PX*2.4);  /* she bails rightward, away from the iron */
    const toY = surfaceScreenY('floor');
    const peak = fromY - KIKI_PX*0.7;
    const DUR = 700;
    facing = 1;
    const t1 = performance.now();
    await new Promise(res => {
      (function flee(now) {
        const p = Math.min(1, (now - t1)/DUR);
        const q = 1 - p;
        kx = q*q*fromX + 2*q*p*((fromX+toX)/2) + p*p*toX;
        ky = q*q*fromY + 2*q*p*peak + p*p*toY;
        if (p < 1) requestAnimationFrame(flee); else { kx = toX; ky = toY; res(); }
      })(t1);
    });
    surface = 'floor';
    kikiEl.src = S.land;
    await wait(160);

    /* she sits at a safe distance, collects herself */
    facing = 1;
    kikiEl.src = S.sitFront;
    sayImg('bench_hot.png');
    await wait(1600);

    sayImg('bench_climbagain.png');
    await wait(1800); await hideImg();

    burnt = true;
    captionBench.style.opacity = 1;
    ironCooldown = performance.now() + 3000;
    mode = 'free';
  })();
}

/* ---------- the INTRO — hand-drawn bubbles ---------- */
function runIntro() {
  const wait = ms => new Promise(res => setTimeout(res, ms));
  const pointer = document.getElementById('laserPointer');

  const showB = sayImg;    /* reuse the shared crossfade — no blink, one system everywhere */
  const hideB = hideImg;

  (async () => {
    kikiEl.src = S.sitFront;
    await wait(800);

    kikiEl.src = S.hi;   /* the wave */
    showB('hi.png');
    playSound('meow');
    await wait(2000);

    kikiEl.src = S.sitFront;
    showB('intro_mombusy.png');
    await wait(2300);

    showB('tour.png');
    await wait(2100);

    showB('invite.png');
    await wait(2100);

    /* the ask — bubble stays; the drawn laser pointer appears beside her */
    showB('laser.png');
    pointer.style.left = (kx + KIKI_PX*0.65) + 'px';
    pointer.style.top = (ky - KIKI_PX*0.99) + 'px';
    pointer.style.opacity = 1;
    pointer.style.pointerEvents = 'auto';

    pointer.addEventListener('click', function start(e) {
      pointer.removeEventListener('click', start);
      pointer.style.pointerEvents = 'none';

      /* handoff: the dot flies from the pointer's tip to your hand */
      const r = pointer.getBoundingClientRect();
      const fly = document.createElement('div');
      fly.style.cssText = `position:fixed; left:${r.left + r.width*0.85}px; top:${r.top + r.height*0.12}px;
        width:14px; height:14px; border-radius:50%; z-index:9;
        background:radial-gradient(circle,#ff5a5a 0%,#ff2020 55%,rgba(255,32,32,0) 75%);
        filter:drop-shadow(0 0 6px rgba(255,40,40,0.8));
        transform:translate(-50%,-50%);
        transition:left 0.45s cubic-bezier(.3,.7,.4,1), top 0.45s cubic-bezier(.3,.7,.4,1);`;
      document.body.appendChild(fly);
      requestAnimationFrame(() => {
        fly.style.left = e.clientX + 'px';
        fly.style.top = e.clientY + 'px';
      });

      setTimeout(() => {
        fly.remove();
        activeBubble.style.opacity = 0;
        pointer.style.opacity = 0;
        document.body.classList.add('playing');
        mouseX = e.clientX; mouseY = e.clientY;
        kikiEl.src = S.crouch;
        /* mode stays paused ('intro') until she's shown the instructions
           and the visitor actively confirms them — real gameplay only
           starts once this modal is dismissed. */
        const onboard = document.getElementById('onboardOverlay');
        const onboardCard = document.getElementById('onboardCard');
        onboard.style.opacity = 1;
        onboard.style.pointerEvents = 'auto';
        requestAnimationFrame(() => { onboardCard.style.transform = 'translateY(0) scale(1)'; });

        document.getElementById('onboardCloseBtn').addEventListener('click', function closeOnboard() {
          onboard.style.opacity = 0;
          onboard.style.pointerEvents = 'none';
          mode = 'free';
        }, { once: true });
      }, 470);
    });
  })();
}

/* ---------- the FINALE: home ---------- */
function runFinale() {
  mode = 'finale';
  const wait = ms => new Promise(res => setTimeout(res, ms));

  (async () => {
    /* she's home: the summit blooms */
    document.getElementById('treeColored7').style.opacity = 1;
    await wait(500);

    /* walk to the front of her house */
    const homeX = scrX(560);
    while (Math.abs(kx - homeX) > 6) {
      kx += Math.sign(homeX - kx) * 2.0;
      facing = (homeX > kx) ? 1 : -1;
      await wait(16);
    }
    await wait(300);

    /* the long stretch — a cat arriving exactly where she meant to be */
    kikiEl.src = S.stretch;
    await wait(1500);

    /* and she sits, holding the letter in her mouth. done. */
    facing = 1;
    kikiEl.src = S.kiki_letter;
    playSound('meow');
    await wait(600);

    /* "Mom left a letter for you" */
    sayImg('letter_intro_small.png');
    await wait(2200); await hideImg();

    /* she's the click target now — whole-cat hitbox, not just the tiny letter.
       clickable every time, so the letter can be reopened as often as needed. */
    kikiEl.style.pointerEvents = 'auto';
    kikiEl.style.cursor = 'pointer';

    kikiEl.addEventListener('click', function openLetter() {
      const overlay = document.getElementById('letterOverlay');
      const paper = document.getElementById('letterPaper');
      overlay.style.opacity = 1;
      overlay.style.pointerEvents = 'auto';
      requestAnimationFrame(() => { paper.style.transform = 'translateY(0) scale(1)'; });
    });

    document.getElementById('closeLetterBtn').addEventListener('click', () => {
      const overlay = document.getElementById('letterOverlay');
      const paper = document.getElementById('letterPaper');
      overlay.style.opacity = 0;
      overlay.style.pointerEvents = 'none';
      paper.style.transform = 'translateY(16px) scale(0.97)';
    });

    mode = 'done';   /* she lives here now — no more chasing */
  })();
}

/* ---------- the DROPLET: she rears up, touches it, light happens ---------- */
function runDroplet() {
  mode = 'droplet';
  const wait = ms => new Promise(res => setTimeout(res, ms));
  const glint = document.getElementById('glint');

  (async () => {
    /* stand so her raised paw lines up with the droplet (paw reaches up-right),
       but never step past the platform edge */
    facing = 1;
    const [bMin, bMax] = surfaceBounds('cloud');
    const underX = Math.max(bMin, Math.min(bMax, scrX(DROPLET_X) - KIKI_PX * 0.27));
    while (Math.abs(kx - underX) > 6) {
      kx += Math.sign(underX - kx) * 2.2;
      await wait(16);
    }
    kikiEl.src = S.sit;
    await wait(400);

    /* she rears up on her hind legs, paw reaching for the droplet */
    kikiEl.src = S.rearup;
    await wait(650);

    /* contact — and the light travels up: the cloud blooms from her touch */
    if (!bloomed6) {
      document.getElementById('treeColored6').style.opacity = 1;
      bloomed6 = true;
    }
    await wait(1300);

    /* back down on all fours, watching her work */
    kikiEl.src = S.sit;
    await wait(700);

    dropletDone = true;
    captionCloud.style.opacity = 1;
    mode = 'free';
  })();
}

/* ---------- the SWAT: castle demolition ---------- */
function runSwat() {
  mode = 'swat';
  const wait = ms => new Promise(res => setTimeout(res, ms));

  (async () => {
    /* face the castle, wind up */
    facing = (scrX(CASTLE_X) > kx) ? 1 : -1;
    kikiEl.src = S.crouch;
    await wait(380);

    /* SWAT */
    kikiEl.src = S.swat;
    await wait(120);
    document.getElementById('treeColored5').style.opacity = 1;   /* bricks everywhere */
    playSound('bricks_falling');
    castleIntact = false;
    /* a quick jolt through the tree sells the impact */
    document.querySelectorAll('.tree').forEach(el => {
      el.animate([
        { transform: 'translateX(-50%)' },
        { transform: 'translateX(calc(-50% + 4px))' },
        { transform: 'translateX(calc(-50% - 3px))' },
        { transform: 'translateX(-50%)' },
      ], { duration: 240 });
    });
    await wait(600);

    /* the beat of silence: she turns to face the viewer. innocence. (wordless) */
    kikiEl.src = S.sitFront;
    await wait(1400);

    /* the meow-face — happy, zero remorse. the sprite IS the dialogue. */
    kikiEl.src = S.meow;
    playSound('meow');
    await wait(1300);

    kikiEl.src = S.sitFront;
    sayImg('lego_whybuildplay.png');
    await wait(2000);

    sayImg('lego_playwithme.png');
    await wait(2100); await hideImg();

    legoDone = true;
    captionLego.style.opacity = 1;
    mode = 'free';
  })();
}

/* ---------- sticky note beat ---------- */
function runBeat() {
  mode = 'beat';
  const wait = ms => new Promise(res => setTimeout(res, ms));

  (async () => {
    facing = 1;
    kikiEl.src = S.sitFront;
    sayImg('base_wall.png');
    await wait(2100);

    sayImg('base_braindump.png');
    await wait(2100);

    sayImg('base_justacat.png');
    await wait(2000); await hideImg();

    /* transition beat: she grooms before wandering into the notes */
    kikiEl.src = S.groom;
    await wait(700);

    kikiEl.src = S.sit;
    await wait(420);

    sayImg('base_sticky.png');
    await wait(1600); await hideImg();

    kikiEl.src = S.shake;
    const wig = setInterval(() => { wiggle = (wiggle===3 ? -3 : 3); }, 130);
    await wait(1300);
    clearInterval(wig); wiggle = 0;

    sayImg('base_stuck.png');
    await wait(1500); await hideImg();

    noteEl.style.left = (kx + KIKI_PX*0.22*facing - KIKI_PX*0.09)+'px';
    noteEl.style.top = (ky - KIKI_PX*0.55)+'px';
    noteEl.style.opacity = 1;
    kikiEl.src = S.sit;
    await wait(60);
    noteEl.style.transition = 'transform 0.7s ease-in, opacity 0.7s';
    noteEl.style.transform = `translate(${70*facing}px, -120px) rotate(340deg)`;
    noteEl.style.opacity = 0;
    await wait(620);

    kikiEl.src = S.sit;
    captionEl.style.opacity = 1;
    beatDone = true;
    mode = 'free';
  })();
}

/* ---------- main loop ---------- */
function loop(t) {
  /* keep her feet ON the surface at all times, except when an
     animation is deliberately lifting her (jumps, the yeow flee) */
  if (mode !== 'jump' && mode !== 'yeow') {
    ky = surfaceScreenY(surface);
  }

  if (mode === 'intro') {
    /* she sits and hosts; the world waits */
  } else if (mode === 'free') {
    /* two locks, working together:
       1. she can only climb UP once she's fully finished the current level's
          interaction — dialogue and gag both.
       2. once she's reached a level, the laser can never pull her back BELOW
          it again — every gag is strictly one-time, forward-only progress. */
    const LEVEL_DONE = { floor: beatDone, bench: burnt, lego: legoDone, cloud: dropletDone, top: true };
    let want = laserSurface();
    const curIdx = LADDER.indexOf(surface), wantIdx = LADDER.indexOf(want);
    if (wantIdx < maxReached) {
      want = surface;   /* locked — no going back to a level already completed */
    } else if (wantIdx > curIdx && !LEVEL_DONE[surface]) {
      want = surface;   /* locked — laser can't pull her up yet, stay and finish here */
    }

    if (want !== surface) {
      const rung = nextRung(want);
      /* run toward the launch point, then jump */
      const [minX, maxX] = surfaceBounds(rung);
      const launchX = Math.max(minX, Math.min(maxX, mouseX));
      const dx = launchX - kx;
      if (Math.abs(dx) > KIKI_PX*0.9) {
        /* not under it yet — run there along current surface */
        const [cMin, cMax] = surfaceBounds(surface);
        const tx = Math.max(cMin, Math.min(cMax, launchX));
        const d2 = tx - kx;
        if (Math.abs(d2) > 8) {
          kx += Math.sign(d2) * Math.min(Math.abs(d2)*0.045, 8);
          facing = d2 > 0 ? 1 : -1;
          setAnim(S.run, 10, t);
        } else {
          startJump(rung);
        }
      } else {
        startJump(rung);
      }
    } else {
      /* normal chase on the current surface */
      const [minX, maxX] = surfaceBounds(surface);
      const targetX = Math.max(minX, Math.min(maxX, mouseX));
      const dx = targetX - kx;
      const dist = Math.abs(dx);

      if (dist > 26) {
        const step = Math.min(dist*0.035, dist > 380 ? 8.5 : 4.5);
        kx += Math.sign(dx)*step;
        facing = dx > 0 ? 1 : -1;
        setAnim(dist > 380 ? S.run : S.walk, dist > 380 ? 10 : 7, t);
        wiggle = 0;
      } else {
        const REACH_Y = ky - KIKI_PX * 0.55;   /* an honest seated paw-swipe, no more */
        if (mouseY < REACH_Y) {
          kikiEl.src = S.crouch;
          const phase = t % 3400;
          wiggle = (phase < 480) ? Math.sin(t/55)*2.4 : 0;
        } else {
          wiggle = 0;
          const idle = performance.now() - lastMove;
          kikiEl.src = (idle > 3500) ? S.groom : S.catch;
        }
      }

      /* she brings the color: base blooms when she first walks in */
      if (!bloomed2 && surface === 'floor' && imgX(kx) > BASE_ZONE_MIN && imgX(kx) < BASE_ZONE_MAX) {
        treeColored.style.opacity = 1;
        bloomed2 = true;
      }

      /* sticky note trigger — floor only */
      if (!beatDone && surface === 'floor' && Math.abs(kx - scrX(TRIGGER_IMG_X)) < TRIGGER_RANGE) runBeat();

      /* hot iron trigger — bench only */
      if (surface === 'bench' && !burnt &&
          Math.abs(kx - scrX(IRON_TIP_X)) < IRON_RANGE * TREE_SCALE * 3) runYeow();

      /* castle swat — lego platform, once */
      if (surface === 'lego' && castleIntact &&
          Math.abs(kx - scrX(CASTLE_X)) < CASTLE_RANGE * TREE_SCALE * 2.2) runSwat();

      /* droplet touch — cloud platform, once */
      if (surface === 'cloud' && !dropletDone &&
          Math.abs(kx - scrX(DROPLET_X)) < 90 * TREE_SCALE * 2.5) runDroplet();
    }
  }

  /* ---------- render ---------- */
  const flipFix = kikiEl.src.includes('catch') ? -1 : 1;
  kikiEl.style.transform = `translate(${kx - KIKI_PX/2}px, ${ky - KIKI_PX + footPad()}px) scaleX(${facing*flipFix}) rotate(${wiggle}deg)`;
  /* shadow stays on the surface below her, even mid-jump */
  const shadowY = (mode === 'jump')
      ? surfaceScreenY(surface)   /* origin surface while airborne */
      : ky;
  shadowEl.style.transform = `translate(${kx - KIKI_PX*0.31}px, ${shadowY - KIKI_PX*0.10}px)`;
  const airborne = Math.max(0, (shadowY - ky) / (KIKI_PX*1.2));
  shadowEl.style.opacity = 0.35 - airborne*0.2;

  bubbleEl.style.left = (kx - 30)+'px';
  bubbleEl.style.top = (ky - KIKI_PX - 78)+'px';

  laserEl.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%,-50%)`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
runIntro();

/* ---------- skip toggle: always available, any time ---------- */

  const overlay = document.getElementById('noPlayOverlay');
  const paper = document.getElementById('noPlayPaper');

  overlay.style.pointerEvents = 'auto';
  requestAnimationFrame(() => { paper.style.transform = 'translateY(0) scale(1)'; });
});

  const overlay = document.getElementById('noPlayOverlay');
  const paper = document.getElementById('noPlayPaper');
  overlay.style.opacity = 0;
  overlay.style.pointerEvents = 'none';
  paper.style.transform = 'translateY(16px) scale(0.97)';
});
